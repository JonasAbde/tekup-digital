<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="faceGrad" x1="48" y1="36" x2="208" y2="228">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="140" rx="100" ry="100" fill="url(#glowBg)"/>
  <!-- Left ear -->
  <path d="M72 105 45 34l62 47" fill="#111827" stroke="#22D3EE" stroke-width="5" stroke-linejoin="round" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M72 105 55 55l44 38" fill="#22D3EE" opacity="0.1"/>
  <!-- Right ear -->
  <path d="M184 105 211 34l-62 47" fill="#111827" stroke="#22D3EE" stroke-width="5" stroke-linejoin="round" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <path d="M184 105 201 55l-44 38" fill="#22D3EE" opacity="0.1"/>
  <!-- Face -->
  <path d="M78 88c12-22 33-34 50-34s38 12 50 34c18 4 34 24 34 56 0 48-36 78-84 78s-84-30-84-78c0-32 16-52 34-56Z" fill="url(#faceGrad)" stroke="#22D3EE" stroke-width="4" opacity="0.7"/>
  <!-- Eye left - blinking (pulse radius) -->
  <circle cx="104" cy="148" r="9" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0.5">
    <animate attributeName="r" values="9;2;9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Eye right - dot (alert/scanning) -->
  <circle cx="152" cy="148" r="4" fill="#67E8F9" opacity="0.8">
    <animate attributeName="r" values="4;6;4" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Smile -->
  <path d="M119 166c4 4 14 4 18 0" fill="none" stroke="#E5E7EB" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <!-- Scanning arc -->
  <path d="M155 115 A40 40 0 0 1 155 181" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.4" stroke-dasharray="4 4">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
  </path>
</svg>
