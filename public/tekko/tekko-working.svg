<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="faceGrad" x1="48" y1="36" x2="208" y2="228">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>
  <ellipse cx="128" cy="140" rx="100" ry="100" fill="url(#glowBg)"/>
  <!-- Left ear -->
  <path d="M72 105 45 34l62 47" fill="#111827" stroke="#34D399" stroke-width="5" stroke-linejoin="round"/>
  <path d="M72 105 55 55l44 38" fill="#34D399" opacity="0.2"/>
  <!-- Right ear -->
  <path d="M184 105 211 34l-62 47" fill="#111827" stroke="#34D399" stroke-width="5" stroke-linejoin="round"/>
  <path d="M184 105 201 55l-44 38" fill="#34D399" opacity="0.2"/>
  <!-- Face -->
  <path d="M78 88c12-22 33-34 50-34s38 12 50 34c18 4 34 24 34 56 0 48-36 78-84 78s-84-30-84-78c0-32 16-52 34-56Z" fill="url(#faceGrad)" stroke="#34D399" stroke-width="4"/>
  <!-- Cheek glows - brighter -->
  <ellipse cx="90" cy="155" rx="20" ry="14" fill="#10B981" opacity="0.1"/>
  <ellipse cx="166" cy="155" rx="20" ry="14" fill="#10B981" opacity="0.1"/>
  <!-- Eyes - full bright solid -->
  <ellipse cx="104" cy="148" rx="11" ry="11" fill="#10B981"/>
  <ellipse cx="152" cy="148" rx="11" ry="11" fill="#10B981"/>
  <!-- Eye shine -->
  <circle cx="100" cy="144" r="3" fill="#ffffff" opacity="0.6"/>
  <circle cx="148" cy="144" r="3" fill="#ffffff" opacity="0.6"/>
  <!-- Smile - confident -->
  <path d="M119 166c4 4 14 4 18 0" fill="none" stroke="#A7F3D0" stroke-width="4" stroke-linecap="round"/>
  <!-- Data lines -->
  <line x1="185" y1="60" x2="195" y2="50" stroke="#10B981" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.8s" repeatCount="indefinite"/>
  </line>
  <line x1="195" y1="70" x2="205" y2="60" stroke="#34D399" stroke-width="2" stroke-linecap="round" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0;0.3" dur="1s" repeatCount="indefinite"/>
  </line>
</svg>
