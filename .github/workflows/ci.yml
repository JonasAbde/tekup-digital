name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify landing app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Tekko mascot system
        run: npm run verify:tekko

      - name: Verify release gate
        run: npm run verify:release

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
